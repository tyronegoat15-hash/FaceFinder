name: FaceFinder
targets:
  FaceFinder:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SocialFinder
    info:
      path: SocialFinder/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.facefinder.app
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_FILE: SocialFinder/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: 5.0
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
